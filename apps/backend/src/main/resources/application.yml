spring:
  application:
    name: event-app-tracker

  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:false}
  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:3000}
      idle-timeout: 300000
      max-lifetime: 600000
      initialization-fail-timeout: ${DB_INITIALIZATION_FAIL_TIMEOUT_MS:30000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
    show-sql: false

  sql:
    init:
      mode: never

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    enabled: ${MAIL_ENABLED:false}

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  shutdown: graceful
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    max-http-request-header-size: 20KB
    max-http-post-size: 2MB
    max-http-form-post-size: 2MB
    threads:
      max: ${TOMCAT_MAX_THREADS:50}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:5}
    processor-cache: 50
    accept-count: 50
  compression:
    enabled: false
  http2:
    enabled: false
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    mail:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-very-long-secret-key-that-is-at-least-64-characters-long-to-satisfy-hs512-requirements}
    expiration: 86400000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://eventpulse-phi.vercel.app}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://eventpulse-phi.vercel.app,https://*.vercel.app}}

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/google/callback
    github:
      client-id: ${GITHUB_CLIENT_ID}
      client-secret: ${GITHUB_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/github/callback

logging:
  level:
    root: INFO
    com.eventtracker: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
