spring:
  application:
    name: event-app-tracker

  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:postgresql://localhost:5432/event_tracker_db
    username: postgres
    password: Rohk_1265
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: false

  sql:
    init:
      mode: always

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    enabled: ${MAIL_ENABLED:false}

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    max-http-request-header-size: 20KB
    max-http-post-size: 2MB
    max-http-form-post-size: 2MB
    threads:
      max: 200
      min-spare: 10
    processor-cache: 200
    accept-count: 100
  compression:
    enabled: false
  http2:
    enabled: false
  forward-headers-strategy: framework

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-very-long-secret-key-that-is-at-least-64-characters-long-to-satisfy-hs512-requirements}
    expiration: 86400000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/google/callback
    github:
      client-id: ${GITHUB_CLIENT_ID}
      client-secret: ${GITHUB_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/github/callback

logging:
  level:
    root: INFO
    com.eventtracker: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
