spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: event-app-tracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/event_tracker_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Rohk_1265}

  jpa:
    hibernate:
      ddl-auto: none

  sql:
    init:
      mode: always

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user
        provider:
          github:
            user-info-uri: https://api.github.com/user
            user-name-attribute: name

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-very-long-secret-key-that-is-at-least-64-characters-long-to-satisfy-hs512-requirements}
    expiration: 1800000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.eventtracker.security: DEBUG
    com.eventtracker.controller: DEBUG
    com.eventtracker.service: DEBUG
    root: INFO

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: "*"

  server:
    port: 8080

  endpoint:
    health:
      show-details: always
