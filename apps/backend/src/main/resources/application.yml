spring:
  application:
    name: event-app-tracker

  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
    lazy-initialization: true
  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 10000
      validation-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 600000
      initialization-fail-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
    show-sql: false

  sql:
    init:
      mode: never

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    enabled: ${MAIL_ENABLED:false}

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  shutdown: graceful
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    max-http-request-header-size: 20KB
    max-http-post-size: 2MB
    max-http-form-post-size: 2MB
    threads:
      max: ${TOMCAT_MAX_THREADS:50}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:5}
    processor-cache: 50
    accept-count: 50
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024
  http2:
    enabled: false
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    mail:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-very-long-secret-key-that-is-at-least-64-characters-long-to-satisfy-hs512-requirements}
    expiration: 1800000 # 30 minutes in ms

  cors:
    allowed-origins: https://your-vercel-app.vercel.app
    allowed-origin-patterns: https://your-vercel-app.vercel.app

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/google/callback
    github:
      client-id: ${GITHUB_CLIENT_ID}
      client-secret: ${GITHUB_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/github/callback

logging:
  level:
    root: INFO
    com.eventtracker: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
