spring:
  application:
    name: event-app-tracker

  main:
    # REMOVED: allow-circular-references: true (forces eager proxying)
    # REMOVED: allow-bean-definition-overriding: true
    lazy-initialization: true
    banner-mode: off # ADDED: saves ~50ms parsing/printing
  lifecycle:
    timeout-per-shutdown-phase: 10s # REDUCED: was 20s

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 3000 # REDUCED: was 5000
      validation-timeout: 1000 # REDUCED: was 5000
      idle-timeout: 240000
      max-lifetime: 300000
      initialization-fail-timeout: -1 # CHANGED: fail immediately if DB is down, don't block startup for 10s
      keepalive-time: 30000 # ADDED: prevents connection drops on Render

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        generate_statistics: false
        jdbc.lob.non_contextual_creation: true
    show-sql: false

  sql:
    init:
      mode: never

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
    enabled: ${MAIL_ENABLED:false}

server:
  port: ${PORT}
  address: 0.0.0.0
  shutdown: graceful
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    max-http-request-header-size: 20KB
    max-http-post-size: 2MB
    max-http-form-post-size: 2MB
    threads:
      max: ${TOMCAT_MAX_THREADS:50}
      min-spare: 2 # REDUCED: was 5
    processor-cache: 50
    accept-count: 20 # REDUCED: was 50
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024
  http2:
    enabled: false
  forward-headers-strategy: framework

management:
  endpoints:
    enabled-by-default: false # ADDED: disable all by default
    web:
      exposure:
        include: health # REDUCED: removed 'info'
  endpoint:
    health:
      enabled: true # ADDED: re-enable health
      probes:
        enabled: true
      show-details: never
  health:
    mail:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-very-long-secret-key-that-is-at-least-64-characters-long-to-satisfy-hs512-requirements}
    expiration: 1800000 # 30 minutes in ms

  cors:
    allowed-origins: https://eventpulse-phi.vercel.app,https://eventpulse-phi-git-main-yourusername.vercel.app,https://localhost:3000

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/google/callback
    github:
      client-id: ${GITHUB_CLIENT_ID}
      client-secret: ${GITHUB_CLIENT_SECRET}
      redirect-uri: http://localhost:3000/api/auth/github/callback

logging:
  level:
    root: WARN
    com.eventtracker: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: ERROR
    com.zaxxer.hikari: WARN
  pattern:
    console: "%p %c{1} - %m%n" # SIMPLIFIED: removed date prefix to reduce logging overhead
