spring:
  # Use an in-memory DB for tests by default.
  datasource:
    url: jdbc:h2:mem:eventtracker_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Avoid accidental external calls during tests
  mail:
    host: localhost
    port: 2525

logging:
  level:
    org.springframework.security: WARN
